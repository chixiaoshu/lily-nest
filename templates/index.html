<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lily Nest example - 梨窝</title>

    <link
      rel="preload"
      href="/fonts/material-symbols.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <script>
      (function () {
        const t = localStorage.getItem("theme") || "system";
        if (
          t === "dark" ||
          (t === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <script src="/js/user.js" defer></script>
    <link rel="stylesheet" href="/css/md-theme.css" />
    <link rel="stylesheet" href="/css/user-theme.css" />
    <script type="module" src="/js/MaterialWeb.js"></script>
  </head>
  <body>
    <header class="app-bar">
      <div class="app-bar-content">
        <!-- 左侧区域（预留） -->
        <section class="start">
          <!-- 可以放 logo 或菜单按钮 -->
        </section>

        <!-- 右侧区域 -->
        <section class="end">
          <div class="theme-selector">
            <md-text-button id="theme-btn">
              <md-icon>palette</md-icon>
            </md-text-button>

            <md-menu anchor="theme-btn" id="theme-menu">
              <md-menu-item data-mode="light">
                <div slot="headline">浅色</div>
              </md-menu-item>
              <md-menu-item data-mode="dark">
                <div slot="headline">深色</div>
              </md-menu-item>
              <md-menu-item data-mode="system">
                <div slot="headline">系统</div>
              </md-menu-item>
            </md-menu>
          </div>
        </section>
      </div>
    </header>
    <main class="main-content">
      <div id="home" class="hero-wrapper">
        <div class="tonal-container hero-layout">
          <div class="left-content">
            <section class="primary-section">
              <div class="avatar-container">
                <div class="avatar-status-bg"></div>
                <img src="{{avatar}}" alt="Avatar" class="avatar-image" />
              </div>
              <div class="main-intro">{{intro}}</div>
              <nav class="action-row">
                <md-filled-button href="#home">首页</md-filled-button>
                <md-filled-tonal-button href="https://example.com"
                  >博客</md-filled-tonal-button
                >
                <md-filled-tonal-button href="#projects"
                  >项目</md-filled-tonal-button
                >
                <md-filled-tonal-button href="#about"
                  >关于</md-filled-tonal-button
                >
              </nav>
            </section>

            <section class="secondary-section">
              <span class="label-text">TEAM MEMBERS</span>
              <div class="action-row">{{members_html}}</div>
            </section>
          </div>

          <div class="right-content">
            <img src="{{bg}}" alt="Hero illustration" class="cover-image" />
            <div class="cover-overlay">
              <h1 class="cover-title">{{title}}</h1>
              <p class="cover-subtitle">{{ver}}</p>
            </div>
          </div>
        </div>
      </div>
      <!-- 项目概览 -->
      <section class="content-section">
        <div class="section-header">
          <md-icon>folder</md-icon>
          <h2 id="projects">项目概览</h2>
          <a
            class="header-anchor"
            href="#projects"
            aria-label="Link to Projects"
            >#</a
          >
        </div>
        <div class="tonal-container list-layout">
          <md-list class="project-list">
            {{projects_html}}

            <md-divider></md-divider>

            <md-list-item>
              <md-icon slot="start">add</md-icon>
              <div slot="headline">更多项目正在路上</div>
              <div slot="supporting-text">
                项目列表将从后端配置文件动态加载，敬请期待。
              </div>
            </md-list-item>
          </md-list>
        </div>
      </section>
      <!-- 关于我 -->
      <section class="content-section">
        <div class="section-header">
          <md-icon>person</md-icon>
          <h2 id="about">关于我</h2>
          <a class="header-anchor" href="#about" aria-label="Link to About"
            >#</a
          >
        </div>
        <div class="tonal-container list-layout">
          <md-list class="aboutme-list">
            {{about_items_html}}
            <md-list-item href="mailto:example@mail.com" type="link">
              <md-icon slot="start">mail</md-icon>
              <div slot="headline">联系我</div>
              <div slot="supporting-text">咕噜咕噜邮箱</div>
            </md-list-item>
          </md-list>
        </div>
      </section>
    </main>
  </body>
</html>
