<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lily Nest example - 梨窝</title>

    <script src="/js/user.js" defer></script>
    <link rel="stylesheet" href="/css/md-theme.css" />
    <link rel="stylesheet" href="/css/user-theme.css" />
    <script type="module" src="/js/MaterialWeb.js"></script>
  </head>
  <body>
    <header class="app-bar">
      <div class="app-bar-content">
        <!-- 左侧区域（预留） -->
        <section class="start">
          <!-- 可以放 logo 或菜单按钮 -->
        </section>

        <!-- 右侧区域 -->
        <section class="end">
          <!-- 可以放 logo 或菜单按钮 -->
        </section>
      </div>
    </header>
    <main class="main-content">
      <div id="home" class="hero-wrapper reveal">
        <div class="tonal-container hero-layout">
          <div class="left-content">
            <section class="primary-section">
              <div class="avatar-container">
                <div class="avatar-status-bg"></div>
                <img src="{{avatar}}" alt="Avatar" class="avatar-image" />
              </div>
              <div class="main-intro">{{intro}}</div>
              <nav class="action-row">
                <md-filled-button href="#home">首页</md-filled-button>
                <md-filled-tonal-button href="https://example.com"
                  >博客</md-filled-tonal-button
                >
                <md-filled-tonal-button href="#projects"
                  >项目</md-filled-tonal-button
                >
                <md-filled-tonal-button href="#about"
                  >关于</md-filled-tonal-button
                >
              </nav>
            </section>

            <section class="secondary-section">
              <span class="label-text">TEAM MEMBERS</span>
              <div class="action-row">{{members_html}}</div>
            </section>
          </div>

          <div class="right-content">
            <img src="{{bg}}" alt="Hero illustration" class="cover-image" />
            <div class="cover-overlay">
              <h1 class="cover-title">{{title}}</h1>
              <p class="cover-subtitle">{{ver}}</p>
            </div>
          </div>
        </div>
        <!-- 探索 -->
        <div class="explore-more">
          <md-icon>
            <svg style="height: 96px; width: 96px" viewBox="0 -960 960 960">
              <path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z" />
            </svg>
          </md-icon>
        </div>
      </div>

      <!-- 项目概览 -->
      <section class="content-section reveal">
        <div class="section-header">
          <md-icon>
            <svg style="height: 72px; width: 72px" viewBox="0 -960 960 960">
              <path
                d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h240l80 80h320q33 0 56.5 23.5T880-640v400q0 33-23.5 56.5T800-160H160Zm0-80h640v-400H447l-80-80H160v480Zm0 0v-480 480Z"
              />
            </svg>
          </md-icon>
          <h2 id="projects">项目概览</h2>
          <a
            class="header-anchor"
            href="#projects"
            aria-label="Link to Projects"
            >#</a
          >
        </div>
        <div class="tonal-container list-layout">
          <md-list class="project-list">
            {{projects_html}}

            <md-divider></md-divider>

            <md-list-item>
              <md-icon slot="start">
                <svg style="height: 48px; width: 48px" viewBox="0 -960 960 960">
                  <path
                    d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"
                  />
                </svg>
              </md-icon>
              <div slot="headline">更多项目正在路上</div>
              <div slot="supporting-text">
                项目列表将从后端配置文件动态加载，敬请期待。
              </div>
            </md-list-item>
          </md-list>
        </div>
      </section>
      <!-- 关于我 -->
      <section class="content-section reveal">
        <div class="section-header">
          <md-icon>
            <svg style="height: 72px; width: 72px" viewBox="0 -960 960 960">
              <path
                d="M367-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Zm80-80h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm296.5-343.5Q560-607 560-640t-23.5-56.5Q513-720 480-720t-56.5 23.5Q400-673 400-640t23.5 56.5Q447-560 480-560t56.5-23.5ZM480-640Zm0 400Z"
              />
            </svg>
          </md-icon>
          <h2 id="about">关于我</h2>
          <a class="header-anchor" href="#about" aria-label="Link to About"
            >#</a
          >
        </div>
        <div class="tonal-container list-layout">
          <md-list class="aboutme-list">
            {{about_items_html}}
            <md-list-item>
              <md-icon slot="start">
                <svg style="height: 24px; width: 24px" viewBox="0 -960 960 960">
                  <path
                    d="M440-280h80v-240h-80v240Zm68.5-331.5Q520-623 520-640t-11.5-28.5Q497-680 480-680t-28.5 11.5Q440-657 440-640t11.5 28.5Q463-600 480-600t28.5-11.5ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"
                  />
                </svg>
              </md-icon>
              <div slot="headline">更多内容</div>
              <div slot="supporting-text">等待更新中...</div>
            </md-list-item>
          </md-list>
        </div>
      </section>
    </main>
  </body>
</html>
